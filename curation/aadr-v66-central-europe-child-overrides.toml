# Review-candidate child-region priors for the current AADR v66 qpAdm rerun
# target-validation workflow.
#
# These values are curated as a reproducible modeling candidate, not as final
# archaeological estimates. The acceptance gate is the override-delta report
# using root_mean_squared_error with Britain protected at a maximum tolerated
# degradation of 0.03 RMSE.

[review]
status = "review_candidate"
fit_metric = "root_mean_squared_error"
protected_degradation_tolerance = 0.03
protected_holdouts = ["britain"]
priority_holdouts = [
  "central_europe__germany_tiefbrunn_cordedware_1",
  "central_europe__germany_manchingoberstimm_bellbeaker",
]
baseline_validation_fit_csv = "results/qpadm-rerun/central-europe-structured-validation-fit.csv"
override_validation_fit_csv = "results/qpadm-rerun/central-europe-curated-validation-fit.csv"
acceptance_gate = "indoeuropop review-override-deltas --refinement-tolerance 0.03"

[options]
replace_migration_pulses = true

# Tiefbrunn is the largest structured leave-one-requested-group error in the
# current target validation. This candidate gives the child region a smaller
# local population, stronger Steppe pulse, and modest Steppe reproductive
# multiplier so the trajectory can rise earlier than the broad central Europe
# parent without changing unrelated child regions.
[counts.central_europe__germany_tiefbrunn_cordedware_1]
local = 760
steppe = 42

[[migration_pulses]]
region = "central_europe__germany_tiefbrunn_cordedware_1"
start_bce = 2980
end_bce = 2450
annual_rate = 0.00014

[region_parameters.central_europe__germany_tiefbrunn_cordedware_1]
migration_rate = 0.0002

[source_parameters.central_europe__germany_tiefbrunn_cordedware_1.steppe]
reproductive_multiplier = 1.18

# Manching/Oberstimm is another priority holdout with a broad-parent residual.
# This candidate uses a later, weaker pulse and smaller reproductive multiplier
# than Tiefbrunn, matching its Bell Beaker timing while keeping the override
# intentionally narrow.
[counts.central_europe__germany_manchingoberstimm_bellbeaker]
local = 900
steppe = 35

[[migration_pulses]]
region = "central_europe__germany_manchingoberstimm_bellbeaker"
start_bce = 2600
end_bce = 2000
annual_rate = 0.0001

[region_parameters.central_europe__germany_manchingoberstimm_bellbeaker]
migration_rate = 0.00015

[source_parameters.central_europe__germany_manchingoberstimm_bellbeaker.steppe]
reproductive_multiplier = 1.12
